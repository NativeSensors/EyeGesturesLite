<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeGesturesLite Wasm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            text-align: center;
            height: 100vh;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #status {
            color: #666;
            margin: 10px 0;
        }
        #error {
            color: red;
            display: none;
            margin: 10px 0;
        }
        #coords {
            color: #444;
            margin: 10px 0;
            font-weight: 600;
        }
        canvas, video {
            border: 1px solid #ccc;
            max-width: 100%;
        }
        #gaze {
            position: fixed;
            width: 32px;
            height: 32px;
            margin-left: -16px;
            margin-top: -16px;
            border-radius: 999px;
            border: 3px solid #2563eb;
            background: rgba(37, 99, 235, 0.18);
            pointer-events: none;
            z-index: 3;
        }
        #target {
            position: fixed;
            width: 72px;
            height: 72px;
            margin-left: -36px;
            margin-top: -36px;
            border-radius: 999px;
            border: 4px solid #dc2626;
            background: rgba(220, 38, 38, 0.12);
            pointer-events: none;
            z-index: 2;
        }
    </style>
    <link rel="stylesheet" href="eyegestures.css">
    <script src="https://www.lactame.com/lib/ml/6.0.0/ml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>
<body >
    <div id="heatmap-container" style="pointer-events: none; width: 100vw; height: 100vh;">
        <div class="container" >
            <h1>EyeGesturesLite</h1>
            <div id="status">Initializing...</div>
            <div id="error"></div>
            <div id="coords">x: -, y: -</div>
            <video id="video" width="640" height="480" autoplay style="display: none;"></video>
        </div>
    </div>
    <div id="gaze"></div>
    <div id="target"></div>

    <!-- Load MediaPipe library with version check -->
    <script src="https://cdn.jsdelivr.net/npm/heatmap.js@2.0.5/build/heatmap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script type="module">
        import init, { EyeGestures } from "../rust_eyegestures/pkg/eyegestures.js";

        const status = document.getElementById("status");
        const error = document.getElementById("error");
        const coords = document.getElementById("coords");
        const video = document.getElementById("video");
        const gaze = document.getElementById("gaze");
        const target = document.getElementById("target");
        const mirrorCanvas = document.createElement("canvas");
        const mirrorCtx = mirrorCanvas.getContext("2d");

        const data = { max: 100, data: [] };
        const heatmap = h337.create({
            container: document.getElementById("heatmap-container"),
            radius: 50,
            maxOpacity: 0.45,
            blur: 0.85,
        });

        function showError(message) {
            error.textContent = message;
            error.style.display = "block";
            status.textContent = "Failed";
        }

        function updateHeatmap(x, y) {
            if (data.data.length === 20) {
                data.data.pop();
            }

            data.data.unshift({
                x: Math.round(x),
                y: Math.round(y),
                value: 30,
            });

            heatmap.setData(data);
        }

        function flattenLandmarks(landmarks) {
            return new Float64Array(landmarks.flatMap(point => [point.x, point.y]));
        }

        async function main() {
            try {
                status.textContent = "Loading wasm...";
                await init();

                const gestures = new EyeGestures(window.innerWidth, window.innerHeight);
                const faceMesh = new FaceMesh({
                    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`,
                });

                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5,
                });

                faceMesh.onResults(results => {
                    if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
                        return;
                    }

                    const output = gestures.process(flattenLandmarks(results.multiFaceLandmarks[0]));
                    const x = output[0];
                    const y = output[1];
                    const calibrating = output[2] === 1;
                    const calibX = output[3];
                    const calibY = output[4];

                    gaze.style.left = `${x}px`;
                    gaze.style.top = `${y}px`;
                    target.style.left = `${calibX}px`;
                    target.style.top = `${calibY}px`;
                    target.style.display = calibrating ? "block" : "none";
                    coords.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
                    status.textContent = calibrating ? "Calibrating..." : "Tracking";

                    updateHeatmap(x, y);
                });

                status.textContent = "Starting camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                await new Promise(resolve => {
                    video.onloadedmetadata = resolve;
                });
                await video.play();

                mirrorCanvas.width = video.videoWidth;
                mirrorCanvas.height = video.videoHeight;

                async function loop() {
                    if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
                        await faceMesh.send({ image: video });
                    }
                    requestAnimationFrame(loop);
                }

                status.textContent = "Running";
                requestAnimationFrame(loop);
            } catch (cause) {
                showError(String(cause));
            }
        }

        main();
    </script>
</body>
</html>
